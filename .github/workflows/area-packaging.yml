# Area build+pack for the Viu SDK and shared-framework packs ([V01.01.12.19]): proves the
# Assimalign.Viu.Sdk nupkg and the Assimalign.Viu.App Ref/Runtime pack shapes stay healthy.
# Path-filtered like the other area workflows; shared build files trigger every area.
name: area-packaging

on:
  push:
    branches: [main]
    paths:
      - 'sdks/**'
      - 'frameworks/**'
      - 'scripts/Install-Local.ps1'
      - 'libraries/**'
      - 'analyzers/**'
      - 'build/**'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'global.json'
      - 'nuget.config'
      - '.github/actions/**'
      - '.github/workflows/area-packaging.yml'
  pull_request:
    branches: [main]
    paths:
      - 'sdks/**'
      - 'frameworks/**'
      - 'scripts/Install-Local.ps1'
      - 'libraries/**'
      - 'analyzers/**'
      - 'build/**'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'global.json'
      - 'nuget.config'
      - '.github/actions/**'
      - '.github/workflows/area-packaging.yml'

jobs:
  pack:
    name: pack SDK + framework
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The runtime pack builds the framework closure with -p:RuntimeIdentifier=browser-wasm,
      # which requires the wasm-tools workload (NETSDK1147 without it) — same as the app build.
      - name: Set up .NET (with wasm-tools)
        uses: ./.github/actions/setup-dotnet-wasm
        with:
          install-wasm-tools: 'true'

      - name: Pack SDK, runtime pack, and ref pack
        shell: pwsh
        run: ./scripts/Install-Local.ps1

      - name: Assert package shapes
        shell: pwsh
        run: |
          $feed = "_out/packages"
          $expected = @('Assimalign.Viu.Sdk.*.nupkg', 'Assimalign.Viu.App.Ref.*.nupkg', 'Assimalign.Viu.App.Runtime.browser-wasm.*.nupkg')
          foreach ($pattern in $expected) {
            if (-not (Get-ChildItem $feed -Filter $pattern)) { throw "Missing package: $pattern" }
          }

          $expectedFrameworkAssemblies = @(
            'Assimalign.Viu.App',
            'Assimalign.Viu.Browser',
            'Assimalign.Viu.Components',
            'Assimalign.Viu.Core',
            'Assimalign.Viu.Reactivity',
            'Assimalign.Viu.Shared',
            'Assimalign.Viu.State'
          )

          function Assert-FrameworkPackage {
            param(
              [Parameter(Mandatory)]
              [System.IO.FileInfo] $Package,
              [Parameter(Mandatory)]
              [string] $ManifestPath
            )

            $archive = [System.IO.Compression.ZipFile]::OpenRead($Package.FullName)
            try {
              $manifestEntry = $archive.GetEntry($ManifestPath)
              if ($null -eq $manifestEntry) {
                throw "$($Package.Name) is missing $ManifestPath"
              }

              $reader = [System.IO.StreamReader]::new($manifestEntry.Open())
              try {
                [xml] $manifest = $reader.ReadToEnd()
              }
              finally {
                $reader.Dispose()
              }

              $actualFrameworkAssemblies = @(
                $manifest.DocumentElement.File |
                  Where-Object Type -eq 'Managed' |
                  ForEach-Object AssemblyName |
                  Sort-Object
              )
              $difference = @(Compare-Object $expectedFrameworkAssemblies $actualFrameworkAssemblies)
              if ($difference.Count -ne 0) {
                throw "$($Package.Name) managed assembly manifest differs from the framework contract: $($difference | Out-String)"
              }

              foreach ($assemblyName in $expectedFrameworkAssemblies) {
                $assemblyFileName = "$assemblyName.dll"
                $matchingEntries = @($archive.Entries | Where-Object { $_.FullName.EndsWith("/$assemblyFileName", [System.StringComparison]::Ordinal) })
                if ($matchingEntries.Count -ne 1) {
                  throw "$($Package.Name) must contain exactly one $assemblyFileName, found $($matchingEntries.Count)"
                }
              }
            }
            finally {
              $archive.Dispose()
            }
          }

          $referencePackage = @(Get-ChildItem $feed -Filter 'Assimalign.Viu.App.Ref.*.nupkg')
          $runtimePackage = @(Get-ChildItem $feed -Filter 'Assimalign.Viu.App.Runtime.browser-wasm.*.nupkg')
          $sdkPackage = @(Get-ChildItem $feed -Filter 'Assimalign.Viu.Sdk.*.nupkg')
          if ($referencePackage.Count -ne 1) { throw "Expected exactly one reference pack, found $($referencePackage.Count)" }
          if ($runtimePackage.Count -ne 1) { throw "Expected exactly one browser-wasm runtime pack, found $($runtimePackage.Count)" }
          if ($sdkPackage.Count -ne 1) { throw "Expected exactly one SDK package, found $($sdkPackage.Count)" }

          Assert-FrameworkPackage -Package $referencePackage[0] -ManifestPath 'data/FrameworkList.xml'
          Assert-FrameworkPackage -Package $runtimePackage[0] -ManifestPath 'data/RuntimeList.xml'

          $sdkArchive = [System.IO.Compression.ZipFile]::OpenRead($sdkPackage[0].FullName)
          try {
            $requiredSdkEntries = @(
              'Tasks/Assimalign.Viu.Sdk.Tasks.dll',
              'Tasks/Assimalign.Viu.Sdk.Tasks.deps.json',
              'Targets/Assimalign.Viu.Generators.Syntax.props',
              'Targets/Assimalign.Viu.Generators.Syntax.targets',
              'Targets/Assimalign.Viu.Sdk.Css.Bundling.targets'
            )
            foreach ($entryName in $requiredSdkEntries) {
              if ($null -eq $sdkArchive.GetEntry($entryName)) {
                throw "$($sdkPackage[0].Name) is missing $entryName"
              }
            }

            $forbiddenSdkEntries = @(
              'Tasks/Assimalign.Viu.Tooling.Tasks.dll',
              'Tasks/Microsoft.Build.dll',
              'Tasks/Microsoft.Build.Framework.dll',
              'Tasks/Microsoft.Build.Utilities.Core.dll',
              'Tasks/Microsoft.NET.StringTools.dll',
              'Targets/Assimalign.Viu.Syntax.Generators.props',
              'Targets/Assimalign.Viu.Syntax.Generators.targets'
            )
            foreach ($entryName in $forbiddenSdkEntries) {
              if ($null -ne $sdkArchive.GetEntry($entryName)) {
                throw "$($sdkPackage[0].Name) must not contain stale or host-provided entry $entryName"
              }
            }

            $nuspecEntry = @($sdkArchive.Entries | Where-Object { $_.FullName.EndsWith('.nuspec', [System.StringComparison]::OrdinalIgnoreCase) })
            if ($nuspecEntry.Count -ne 1) {
              throw "$($sdkPackage[0].Name) must contain exactly one nuspec, found $($nuspecEntry.Count)"
            }

            $nuspecReader = [System.IO.StreamReader]::new($nuspecEntry[0].Open())
            try {
              [xml] $nuspec = $nuspecReader.ReadToEnd()
            }
            finally {
              $nuspecReader.Dispose()
            }

            $dependencies = @($nuspec.SelectNodes("//*[local-name()='dependency']"))
            if ($dependencies.Count -ne 0) {
              throw "$($sdkPackage[0].Name) must not expose build-time implementation dependencies: $($dependencies.id -join ', ')"
            }
          }
          finally {
            $sdkArchive.Dispose()
          }

          Get-ChildItem $feed -Filter 'Assimalign.Viu.*.nupkg' | ForEach-Object { Write-Host $_.Name }
