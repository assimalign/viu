# Area build+test for Assimalign.Vue.Reactivity.Generators ([V01.01.12.02]): path-filtered so a PR
# only runs the areas it touches; shared build files trigger every area. The build scope is the
# per-area slnx, keeping CI and local builds in lockstep. The generator's tests compile against the
# Assimalign.Vue.Reactivity runtime library (for the [Reactive] attribute), so changes there also
# trigger this area; cross-area contracts are enforced by project references at build time.
name: area-generators

on:
  push:
    branches: [main]
    paths:
      - 'analyzers/Assimalign.Vue.Reactivity.Generators/**'
      - 'libraries/Assimalign.Vue.Reactivity/**'
      - 'build/**'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'global.json'
      - 'nuget.config'
      - '.github/actions/**'
      - '.github/workflows/area-generators.yml'
  pull_request:
    branches: [main]
    paths:
      - 'analyzers/Assimalign.Vue.Reactivity.Generators/**'
      - 'libraries/Assimalign.Vue.Reactivity/**'
      - 'build/**'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'global.json'
      - 'nuget.config'
      - '.github/actions/**'
      - '.github/workflows/area-generators.yml'

jobs:
  build-test:
    name: build+test Generators
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: ./.github/actions/setup-dotnet-wasm

      - name: Build (warnings are errors)
        run: dotnet build analyzers/Assimalign.Vue.Reactivity.Generators/Assimalign.Vue.Reactivity.Generators.slnx --configuration Release -warnaserror

      - name: Test
        run: dotnet test analyzers/Assimalign.Vue.Reactivity.Generators/Assimalign.Vue.Reactivity.Generators.slnx --configuration Release --no-build
