# Area build+test for Assimalign.Vue.Compiler ([V01.01.12.02]): path-filtered so a PR only
# runs the areas it touches; shared build files trigger every area. The build scope is the
# per-area slnx, keeping CI and local builds in lockstep. Jobs are independent by design —
# cross-area contracts are enforced by project references at build time, not workflow ordering.
name: area-compiler

on:
  push:
    branches: [main]
    paths:
      - 'libraries/Assimalign.Vue.Compiler/**'
      # The compiler links Shared's DOM knowledge data as shared source ([V01.01.01.03] seam), so a
      # change to that authoritative table must re-run this area's parser tests.
      - 'libraries/Assimalign.Vue.Shared/src/Internal/DomKnowledgeData.cs'
      - 'build/**'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'global.json'
      - 'nuget.config'
      - '.github/actions/**'
      - '.github/workflows/area-compiler.yml'
  pull_request:
    branches: [main]
    paths:
      - 'libraries/Assimalign.Vue.Compiler/**'
      # The compiler links Shared's DOM knowledge data as shared source ([V01.01.01.03] seam), so a
      # change to that authoritative table must re-run this area's parser tests.
      - 'libraries/Assimalign.Vue.Shared/src/Internal/DomKnowledgeData.cs'
      - 'build/**'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'global.json'
      - 'nuget.config'
      - '.github/actions/**'
      - '.github/workflows/area-compiler.yml'

jobs:
  build-test:
    name: build+test Compiler
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: ./.github/actions/setup-dotnet-wasm

      - name: Build (warnings are errors)
        run: dotnet build libraries/Assimalign.Vue.Compiler/Assimalign.Vue.Compiler.slnx --configuration Release -warnaserror

      - name: Test
        run: dotnet test libraries/Assimalign.Vue.Compiler/Assimalign.Vue.Compiler.slnx --configuration Release --no-build
