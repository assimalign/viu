# Area build+test for Assimalign.Vue.SingleFileComponent ([V01.01.12.02]): path-filtered so a PR only runs the areas
# it touches; shared build files trigger every area. The build scope is the per-area slnx, keeping CI
# and local builds in lockstep. Jobs are independent by design — cross-area contracts are enforced by
# project references at build time, not workflow ordering. The SingleFileComponent library references nothing but the
# BCL, so only its own tree (and the shared build files) gate this area.
name: area-singlefilecomponent

on:
  push:
    branches: [main]
    paths:
      - 'libraries/Assimalign.Vue.SingleFileComponent/**'
      - 'build/**'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'global.json'
      - 'nuget.config'
      - '.github/actions/**'
      - '.github/workflows/area-singlefilecomponent.yml'
  pull_request:
    branches: [main]
    paths:
      - 'libraries/Assimalign.Vue.SingleFileComponent/**'
      - 'build/**'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'global.json'
      - 'nuget.config'
      - '.github/actions/**'
      - '.github/workflows/area-singlefilecomponent.yml'

jobs:
  build-test:
    name: build+test SingleFileComponent
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: ./.github/actions/setup-dotnet-wasm

      - name: Build (warnings are errors)
        run: dotnet build libraries/Assimalign.Vue.SingleFileComponent/Assimalign.Vue.SingleFileComponent.slnx --configuration Release -warnaserror

      - name: Test
        run: dotnet test libraries/Assimalign.Vue.SingleFileComponent/Assimalign.Vue.SingleFileComponent.slnx --configuration Release --no-build
