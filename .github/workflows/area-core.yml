# Area build+test for Assimalign.Viu.Core ([V01.01.12.02]): path-filtered so a PR only
# runs the areas it touches; shared build files trigger every area. The build scope is the
# per-area slnx, keeping CI and local builds in lockstep. Jobs are independent by design —
# cross-area contracts are enforced by project references at build time, not workflow ordering.
# Core consumes contracts emitted by the Reactivity generator, so a generator change re-runs this
# area's tests.
name: area-core

on:
  push:
    branches: [main]
    paths:
      - 'libraries/Assimalign.Viu.Core/**'
      - 'analyzers/Assimalign.Viu.Generators.Reactive/**'
      - 'build/**'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'global.json'
      - 'nuget.config'
      - '.github/actions/**'
      - '.github/workflows/area-core.yml'
  pull_request:
    branches: [main]
    paths:
      - 'libraries/Assimalign.Viu.Core/**'
      - 'analyzers/Assimalign.Viu.Generators.Reactive/**'
      - 'build/**'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'global.json'
      - 'nuget.config'
      - '.github/actions/**'
      - '.github/workflows/area-core.yml'

jobs:
  build-test:
    name: build+test Core
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: ./.github/actions/setup-dotnet-wasm

      - name: Build (warnings are errors)
        run: dotnet build libraries/Assimalign.Viu.Core/Assimalign.Viu.Core.slnx --configuration Release -warnaserror

      - name: Test
        run: dotnet test libraries/Assimalign.Viu.Core/Assimalign.Viu.Core.slnx --configuration Release --no-build
