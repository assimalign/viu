name: Task (WBS)
description: A task under a feature. Prefer New-VuecsWorkItem.ps1, which computes the WBS code and links the sub-issue automatically.
title: "[V01.01.NN.MM.PP] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        **Prefer the script** (`New-VuecsWorkItem.ps1 -As task ...`) so the WBS code, the native
        sub-issue link, and the Project #15 fields (Kind=Task, Area, Origin, Status) are set for you.
        Use this form only as a fallback — then replace `NN.MM.PP` in the title with the next free
        code, set the parent feature, and set the Project fields manually.
  - type: input
    id: parent
    attributes:
      label: Parent feature
      description: The feature this task belongs under.
      placeholder: "#14 [V01.01.02.01] Implement the dependency tracking engine"
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What and why (one or two sentences).
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      value: |
        - <observable, testable outcome>
        - Tests cover the new behavior.
        - The implementation remains trimming-safe and WASM/NativeAOT-compatible.
    validations:
      required: true
  - type: textarea
    id: standards
    attributes:
      label: Standards and Compliance
      value: |
        - <Vue 3 API parity reference, WHATWG/W3C spec, or a note that it is a Vuecs runtime-contract concern>
    validations:
      required: false
