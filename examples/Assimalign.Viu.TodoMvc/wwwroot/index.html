<!DOCTYPE html>
<html lang="en">
<head>
  <title>Viu TodoMVC</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preload" id="webassembly" />
  <script type="importmap"></script>
  <script type="module" src="main#[.{fingerprint}].js"></script>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI Variable Text", "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(180deg, #f6f7f9 0%, #eef0f3 100%);
      color: #21232a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 4rem 1rem;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    #app { width: min(100%, 34rem); }

    .todoapp {
      background: #ffffff;
      border-radius: 1rem;
      box-shadow: 0 1.25rem 3rem rgba(24, 35, 52, 0.12);
      overflow: hidden;
    }

    .header { padding: 1.5rem 1.5rem 0.5rem; }

    .header h1 {
      margin: 0 0 0.75rem;
      font-size: 3rem;
      font-weight: 200;
      text-align: center;
      color: #ce4a3f;
      letter-spacing: 0.04em;
    }

    .new-todo,
    .edit {
      width: 100%;
      padding: 0.9rem 1rem;
      font: inherit;
      border: 1px solid rgba(16, 36, 59, 0.14);
      border-radius: 0.6rem;
      background: #fbfbfc;
    }

    .new-todo:focus, .edit:focus {
      outline: 2px solid #f05a28;
      outline-offset: 1px;
    }

    .main { border-top: 1px solid #eef0f3; padding: 0.5rem 0; }

    .toggle-all { margin: 0 0.5rem 0 1.25rem; }
    .main label[for="toggle-all"] { font-size: 0.85rem; color: #7a8699; }

    .todo-list { list-style: none; margin: 0.5rem 0 0; padding: 0; }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 1.25rem;
      border-top: 1px solid #f1f2f5;
    }

    .todo-view {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex: 1;
      min-width: 0;
    }

    .todo-item .toggle { width: 1.15rem; height: 1.15rem; }

    .todo-item label {
      flex: 1;
      min-width: 0;
      overflow-wrap: anywhere;
      cursor: pointer;
    }

    .todo-item.is-completed label {
      color: #9aa4b2;
      text-decoration: line-through;
    }

    .todo-item .destroy {
      appearance: none;
      border: none;
      background: none;
      color: #c9ccd4;
      font-size: 1.4rem;
      line-height: 1;
      cursor: pointer;
    }
    .todo-item .destroy:hover { color: #ce4a3f; }

    .todo-item.is-editing .todo-view { display: none; }
    .todo-item .edit { margin: 0; }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      flex-wrap: wrap;
      padding: 0.85rem 1.25rem;
      border-top: 1px solid #eef0f3;
      font-size: 0.85rem;
      color: #7a8699;
    }

    .filters { display: flex; gap: 0.35rem; list-style: none; margin: 0; padding: 0; }
    .filters a {
      padding: 0.2rem 0.55rem;
      border-radius: 0.4rem;
      color: inherit;
      text-decoration: none;
      border: 1px solid transparent;
    }
    .filters a.selected {
      border-color: rgba(240, 90, 40, 0.4);
      color: #ce4a3f;
    }

    .clear-completed {
      appearance: none;
      border: none;
      background: none;
      color: inherit;
      cursor: pointer;
      text-decoration: underline;
    }
    .clear-completed:hover { color: #ce4a3f; }
  </style>
</head>
<body>
  <main id="app"></main>
</body>
</html>
